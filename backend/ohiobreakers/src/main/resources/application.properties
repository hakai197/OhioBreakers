# Application name
spring.application.name=ohiobreakers-backend

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ohiobreakers?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Postgres1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (make sure this is at least 32 characters)
app.jwt.secret=mySuperSecretKeyForJWTTokenGeneration2025ThatIsAtLeast32CharactersLong